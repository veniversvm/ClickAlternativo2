services:
  db:
    image: postgres:15-alpine
    container_name: click_alt_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - click_network # <--- AGREGAR ESTO
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: click_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    networks:
      - click_network # <--- AGREGAR ESTO
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - click_network # <--- AGREGAR ESTO
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set myminio http://minio:9000 ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY}) do echo 'Esperando a MinIO...' && sleep 1; done;
      /usr/bin/mc mb myminio/${AWS_BUCKET_NAME} || true;
      /usr/bin/mc anonymous set public myminio/${AWS_BUCKET_NAME};
      exit 0;
      "

  api:
    build:
      context: .
    container_name: click_api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
    ports:
      - "8080:8080"
    networks:
      - click_network # <--- YA ESTABA, ESTÁ BIEN

networks:
  click_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data: